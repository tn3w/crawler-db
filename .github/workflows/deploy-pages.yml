name: Deploy Demo Page

on:
  push:
    branches: [master]
    paths:
      - docs/**
      - .github/workflows/deploy-pages.yml
  release:
    types: [published]
  workflow_run:
    workflows: [Update Feeds]
    types: [completed]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event_name != 'workflow_run'
      || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download demo data
        run: |
          mkdir -p docs/data
          cp crawlers.json docs/data/crawlers.json
          curl -fsSL \
            https://github.com/tn3w/robots-radar/releases/latest/download/crawler-block-percentages.json \
            -o docs/data/crawler-block-percentages.json

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
